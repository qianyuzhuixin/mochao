version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: mochao-minio
    ports:
      - "9000:9000"   # S3 API 端口
      - "9001:9001"   # Web 管理控制台
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  minio-data:
    driver: local
