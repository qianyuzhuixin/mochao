spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://192.168.1.100:3306/mochao?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:mochao}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${REDIS_HOST:192.168.1.100}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DB:0}
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 4
        min-idle: 0
        max-wait: -1ms
    password: ${REDIS_PASSWORD:}

logging:
  level:
    com.mochao: debug
    org.springframework.security: debug
