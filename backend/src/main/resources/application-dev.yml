spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mochao?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:mochao}
    password: ${DB_PASSWORD:mochao}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DB:0}
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 4
        min-idle: 0
        max-wait: -1ms
    password: ${REDIS_PASSWORD:}

# 开发环境 JWT 密钥（生产环境必须通过 JWT_SECRET 环境变量覆盖）
# 注意：开发环境兜底密钥仅供本地调试，切勿用于生产
jwt:
  secret: ${JWT_SECRET:mochao-dev-only-secret-key-2024-NOT-FOR-PRODUCTION-USE}

logging:
  level:
    com.mochao: debug
    org.springframework.security: debug

# 开发环境 MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:}
  secret-key: ${MINIO_SECRET_KEY:}
  bucket: ${MINIO_BUCKET:mochao}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:}
