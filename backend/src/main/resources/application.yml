server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# ==================== MinIO 对象存储 ====================
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:mochao}
  # 外部访问端点（如果 MinIO 在 Docker 内网，前端无法直接访问，需要通过后端代理）
  # 留空则使用 endpoint 作为外部访问地址
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      table-prefix: t_
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000

# ==================== AI 写作配置 ====================
# 方案一：使用 OpenAI 官方 API（需要代理）
# 方案二：使用 DeepSeek（国内直连，OpenAI 兼容，推荐）
#   api-url: https://api.deepseek.com/v1/chat/completions
#   api-key: sk-your-deepseek-key
#   model: deepseek-chat
# 方案三：使用其他兼容 API（Moonshot/阿里百炼/硅基流动等）
# ======================================================
ai:
  provider: ${AI_PROVIDER:openai}
  api-url: ${AI_API_URL:https://api.openai.com/v1/chat/completions}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:gpt-3.5-turbo}
  max-tokens: ${AI_MAX_TOKENS:2000}
  temperature: ${AI_TEMPERATURE:0.8}
  proxy-host: ${AI_PROXY_HOST:}
  proxy-port: ${AI_PROXY_PORT:0}

# ==================== 扫榜抓取服务 ====================
# 独立 Node.js Playwright 服务地址（方案 B：用户触发式抓取）
mochao:
  scraper:
    url: ${SCRAPER_URL:http://127.0.0.1:3001}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs
